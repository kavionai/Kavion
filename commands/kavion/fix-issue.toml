description = "Fix an issue using the Kavion workflow."

prompt = """
User request:
{{args}}

Use the Kavion bug-fix workflow.

Required flow:
1. Read `.gemini/kavion/CURRENT.md` first.
2. Read `.gemini/kavion/PROJECT.md` and `.gemini/kavion/DECISIONS.md` only if needed.
3. Create or update `.gemini/kavion/session.json`.
   - Prefer MCP tool `kavion_update_session` when available.
4. For multi-step fixes, write a plan under `.gemini/kavion/plans/`.
   - Prefer MCP tool `kavion_write_plan` when available.
5. Diagnose root cause before implementation.
6. Update session state when the fix moves from diagnosis to implementation to verification.
7. If diagnosis produced reusable debugging knowledge, persist a note under `.gemini/kavion/notes/`.
8. Verify with real commands and gates, not only narrative claims.
9. Write evidence reports under `.gemini/kavion/reports/` when useful.
   - Prefer MCP tool `kavion_write_report` when available.
10. Before final response, update `.gemini/kavion/CURRENT.md`, session state, and the index.
11. Run a checkpoint before calling the issue fixed.
"""
