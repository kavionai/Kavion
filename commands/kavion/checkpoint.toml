description = "Compatibility alias for the Kavion ship gate."

prompt = """
Run the Kavion ship gate for the current project.

Use MCP tool `kavion_gate` with `ship` when available.

Check:
- worker-backed session state and rendered `.kavion/session.json`
- `.kavion/PROJECT.md`
- `.kavion/CURRENT.md`
- `.kavion/plans/`
- `.kavion/reports/`
- `.kavion/index/`
- git state

Return:
- pass, pass-with-risk, or block
- exact blocking or risky gates
- next command

This command is a compatibility alias. Prefer `/kavion:gate ship` in normal user flows.
"""
