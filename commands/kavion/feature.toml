description = "Build a feature using the Kavion workflow."

prompt = """
User request:
{{args}}

Use the Kavion feature workflow.

Required flow:
1. Check whether Kavion memory exists:
   - `KAVION.md`
   - `.kavion/CURRENT.md`
   If missing, initialize project memory before implementation when writes are permitted.
2. Read `.kavion/CURRENT.md` first. Read `PROJECT.md` and `DECISIONS.md` only when the task needs them.
3. Start or resume the worker-backed session before implementation.
   - Prefer MCP tool `kavion_session_start`.
   - Do not hand-edit `.kavion/session.json`; it is a rendered view.
4. Use task-planner for multi-step work and persist `plan-<task-slug>.md` under `.kavion/plans/`.
   - Prefer MCP tool `kavion_plan_create`.
   - Medium work must not enter `code` phase without a plan artifact.
5. The main agent is the coordinator, not the primary implementer, for Standard work.
   - For backend/API/auth/server/Swagger work, `backend-engineer` is required.
   - For schema/persistence/query/inventory/order/audit-log work, `database-engineer` is required.
   - For auth, RBAC, permissions, secrets, or sensitive user data, `security-engineer` is required before completion.
   - `qa-test-engineer` and `code-reviewer` are required before final completion for non-trivial work.
   - Do not keep substantial backend or database implementation in the main agent when those specialists are required.
   - After each specialist finishes, persist a handoff with `kavion_delegate`.
     - Start with `status: "spawned"` before the specialist-owned implementation step begins.
     - Finish with `status: "completed"`, `failed`, or `needs_context` when that step ends.
     - Include summary, files_changed, tests_run, risks, blockers, next_step, and downstream_context.
   - For multi-step work, update progress through `kavion_plan_step_update` as each plan step starts or completes.
6. After each meaningful phase transition, use `kavion_session_transition`.
   - `init -> plan`
   - `plan -> code`
   - `code -> test`
   - `test -> review`
   - `review -> ship`
   Keep next_step and blocker current through the worker.
7. If investigation or debugging produced reusable findings, persist a note under `.kavion/notes/`.
   - Prefer MCP tool `kavion_write_note` when available.
   - Do not create notes for trivial one-off observations.
8. For verification, prefer real commands and gate checks over self-reported claims.
9. For Standard work, keep evidence reports under `.kavion/reports/`.
   - Persist QA/test reports only for verification outcomes.
   - Persist code review reports only for review outcomes.
   - Persist security reports only for security outcomes when sensitive work is involved.
   - Prefer MCP tool `kavion_report_create` when available.
   - Never use reports for execution-step logging or general progress notes.
10. Before final response, verify required specialist handoffs exist.
   - `task-planner` handoff plus a plan artifact
   - implementation specialist handoffs for required domains
   - `qa-test-engineer` handoff plus QA evidence
   - `code-reviewer` handoff plus review evidence
   - `security-engineer` handoff plus security evidence when required
   - worker-observed file ownership for required implementation specialists
11. Before final response, update shared state through the worker.
   - Let Kavion render `.kavion/CURRENT.md` and `.kavion/session.json`.
   - Update `.kavion/DECISIONS.md` only for real decisions.
12. Refresh `.kavion/index/` after meaningful memory changes.
13. Run a checkpoint before calling the task done.
14. Final response must explicitly state which specialist agents were used, what each one owned, and which `kavion_delegate` handoffs were recorded.
15. Do not hand-edit `.kavion/CURRENT.md`, `.kavion/session.json`, `.kavion/plans/*`, or `.kavion/reports/*`; they are worker-rendered or worker-managed.

Do not auto-load large memory files.
Do not finish Standard work without plan/report files unless writes are blocked and deferred clearly.
Do not leave the session stuck in `plan` once implementation has started.
Do not claim release readiness when ship gate blocks.
"""
