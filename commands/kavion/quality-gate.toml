description = "Compatibility alias for the final Kavion ship gate."

prompt = """
Run the Kavion ship gate and summarize final workflow quality.

Consult these Kavion skill files as workflow guidance:
- quality-gate
- test-verification
- security-review
- code-review-workflow
- github-workflow
- project-memory-workflow

Use MCP tool `kavion_gate` with `ship` when available after normal quality checks.

Required checks:
1. Requirements and acceptance criteria are satisfied.
2. Tests were added or updated when behavior changed.
3. Relevant tests/checks were run or missing checks are documented.
4. Security review ran if sensitive areas were touched.
5. Code review found no blocking issues.
6. Docs or project memory were updated when needed.
7. GitHub branch, issue, and PR state are clear if applicable.
8. Workflow ship gate passes or reports exact risks/blockers.

Return one decision:
- pass
- pass-with-risk
- block

Do not return `pass` when QA is deferred, code review is missing, security review is missing for sensitive work, blockers remain, or memory index is stale.
This command is a compatibility alias. Prefer `/kavion:gate ship` in normal user flows.
"""
