description = "Run the main Kavion orchestration workflow for any software task."

prompt = """
User request:
{{args}}

Use the Kavion orchestration workflow.

Required behavior:
1. Classify the task as Express or Standard.
2. Before implementation, check whether Kavion memory exists:
   - `KAVION.md`
   - `.kavion/CURRENT.md`
   - `.kavion/session.json`
3. Read `.kavion/CURRENT.md` first.
4. Read `.kavion/PROJECT.md` or `.kavion/DECISIONS.md` only when relevant.
5. For Standard work, use the worker-backed session and plan tools.
   - Prefer MCP tools `kavion_session_start`, `kavion_session_transition`, and `kavion_plan_create`.
   - Record phase, status, next_step, and required specialists in worker state.
6. Delegate only to the needed specialist agents.
   - Persist each specialist handoff with `kavion_delegate`.
   - Use `status: "spawned"` before a specialist-owned implementation step so observed tool activity is attributed correctly.
   - Use `kavion_plan_step_update` to keep multi-step execution state current.
   - Do not leave the workflow with implied specialist work and no recorded handoff.
7. After each phase transition, update worker state again.
   - Do not leave the active flow stuck on `task-planner` after implementation delegation starts.
8. Use real commands and gates for verification.
9. Write reports under `.kavion/reports/` when verification/review/security actually happens.
   - Prefer MCP tool `kavion_report_create` when available.
10. If research or debugging produces reusable findings, write a note under `.kavion/notes/`.
11. Update `.kavion/CURRENT.md` and session state before the final response through the worker.
12. Refresh `.kavion/index/` after memory changes.
13. Run a checkpoint before handoff and do not claim completion if required specialist handoffs are missing.
14. Do not hand-edit rendered Kavion outputs. Keep session, plan, report, and history state in the worker.

Do not call every agent by default.
Do not read large memory files unless the task needs them.
Do not finish Standard work without a Memory section in the final response.
"""
