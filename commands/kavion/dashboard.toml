description = "Show a Kavion project dashboard for memory, session, plans, reports, and next actions."

prompt = """
Show the Kavion project dashboard.

Use MCP tool `kavion_status` when available. If MCP is not enabled, inspect these project files directly:
- `.kavion/CURRENT.md`
- `.kavion/PROJECT.md`
- `.kavion/session.json`
- `.kavion/plans/`
- `.kavion/reports/`
- `.kavion/index/`

Return:
- active task
- current phase/status
- next step
- index state
- expired notes or oversized files
- latest plans
- latest reports
- recommended next command

This command is a compatibility alias. Prefer `/kavion:status` in normal user flows.
"""
