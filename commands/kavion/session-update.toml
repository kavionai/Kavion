description = "Advanced maintenance command for Kavion session state."

prompt = """
Update Kavion session state for the current task.

Required:
1. Inspect worker-backed session state and rendered `.kavion/session.json`.
2. If no active session exists and the task is non-trivial, start or resume it through the worker.
3. Update the live session through the worker with:
   - current phase
   - active agent
   - agents used
   - files touched
   - verification run
   - blockers
   - next step
   - last update time
4. If a detailed plan exists, keep it under `.kavion/plans/`.
5. If review, QA, or security output exists, keep it under canonical report files in `.kavion/reports/`.
   - Do not store execution-step logs there.
6. If there are reusable debugging or investigation findings, keep them under `.kavion/notes/`.
7. Refresh `.kavion/index/` after session updates.

Do not rewrite unrelated memory files.
Do not archive the active session unless the task is complete or explicitly paused.
This command is advanced maintenance. Normal users should not need it in the primary workflow.
"""
