description = "Prepare a strict Kavion handoff report after implementation."

prompt = """
Prepare a Kavion handoff report.

User request:
{{args}}

Use MCP tool `kavion_handoff_report` when available. If MCP is unavailable, manually inspect active session state, reports, memory files, and memory index.

Handoff rules:
1. Handoff is blocked if tests/QA are deferred unless the user explicitly asks for a risk handoff.
2. Handoff is blocked if code review is missing for non-trivial work.
3. Handoff is blocked if sensitive work lacks security review.
4. Handoff is blocked if unresolved blockers exist.
5. Handoff must include memory/session update status and memory index status.
6. Do not say "ready for use" or "release-ready" when blocking gates remain.

Final response must include:
- handoff status: ready or blocked
- implementation status
- QA status
- review status
- security status, if applicable
- memory status
- next command
"""
