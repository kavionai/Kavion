description = "Archive the current Kavion task session."

prompt = """
Archive the current Kavion task only if it is genuinely complete.

Required flow:
1. Inspect the worker-backed active session.
2. Run `/kavion:release-readiness` logic or MCP tool `kavion_gate` with `ship` when available.
3. If release readiness is blocked, do not archive.
4. If ready, close the active session through the worker and render a history view under `.kavion/history/`.
5. Let Kavion render `.kavion/session.json` back to idle state.
6. Let Kavion render `.kavion/CURRENT.md` if the active task is complete.
7. Refresh the local index under `.kavion/index/`.
8. Do not create extra report artifacts during archive; archive closes state, it does not log execution progress.

Do not delete useful history.
Do not claim release-ready if ship gate is blocked.
"""
