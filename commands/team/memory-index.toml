description = "Build or refresh the local ForgeKit 2 memory index for this project."

prompt = """
Build or refresh the local ForgeKit 2 memory index.

Use MCP tool `forgekit_build_index` when available. If the MCP server is not enabled, create or update the index manually using normal file tools.

Index these sources:
- `.gemini/forgekit/PROJECT.md`
- `.gemini/forgekit/DECISIONS.md`
- `.gemini/forgekit/CURRENT.md`
- `.gemini/forgekit/session.json`
- `.gemini/forgekit/history.jsonl`
- `.gemini/forgekit/plans/`
- `.gemini/forgekit/reports/`
- `.gemini/forgekit/notes/`

Write index files under:
- `.gemini/forgekit/index/chunks.jsonl`
- `.gemini/forgekit/index/bm25.json`
- `.gemini/forgekit/index/.dirty`

Rules:
1. Markdown and session files remain the source of truth.
2. The index is only a searchable cache.
3. Use heading-aware chunks when possible.
4. Do not index secrets or `.env` files.
5. If no memory files exist, report that `/team:init-project` should run first.
"""
