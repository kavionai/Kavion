description = "Initialize ForgeKit 2 project memory files."

prompt = """
Initialize ForgeKit 2 memory for this project.

Consult the `project-memory-workflow` skill file as guidance.

Create or update these files if missing:
- GEMINI.md
- .gemini/forgekit/PROJECT.md
- .gemini/forgekit/DECISIONS.md
- .gemini/forgekit/DECISIONS-archive.md
- .gemini/forgekit/CURRENT.md
- .gemini/forgekit/session.json
- .gemini/forgekit/history.jsonl
- .gemini/forgekit/gates.yaml
- .gemini/forgekit/plans/
- .gemini/forgekit/reports/
- .gemini/forgekit/notes/
- .gemini/forgekit/index/

Rules:
1. Do not overwrite existing useful content.
2. Inspect the project enough to fill accurate starter notes.
3. Keep PROJECT.md concise and repo-level.
4. Root GEMINI.md should auto-load only CURRENT.md.
5. Do not include secrets.
6. Use ForgeKit templates from the extension:
   - Memory files: forgekit/templates/project-memory/forgekit/
   - Root GEMINI: forgekit/templates/project-memory/GEMINI.md
7. After initialization, build the local BM25 index using MCP tool `forgekit_build_index` when available. If MCP is not enabled, report `/team:memory-index` as the next command.
"""
