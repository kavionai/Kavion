3. If release readiness is blocked, do not archive.
4. If ready, append the current session to `.gemini/forgekit/history.jsonl`.
5. Reset `.gemini/forgekit/session.json` to idle state.
6. Update `.gemini/forgekit/CURRENT.md` if the active task is complete.
7. Refresh the local index under `.gemini/forgekit/index/`.

Do not delete useful history.
Do not claim release-ready if ship gate is blocked.
"""
