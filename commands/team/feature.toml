description = "Build a feature using the ForgeKit workflow."

prompt = """
User request:
{{args}}

Use the ForgeKit feature workflow.

Required flow:
1. Check whether ForgeKit 2 memory exists:
   - `GEMINI.md`
   - `.gemini/forgekit/CURRENT.md`
   - `.gemini/forgekit/session.json`
   If missing, initialize project memory before implementation when writes are permitted.
2. Read `.gemini/forgekit/CURRENT.md` first. Read `PROJECT.md` and `DECISIONS.md` only when the task needs them.
3. Create or update `.gemini/forgekit/session.json` before implementation when writes are permitted.
4. Use task-planner for multi-step work and write `plan-<task-slug>.md` under `.gemini/forgekit/plans/`.
5. Use the correct implementation agents only.
6. For verification, prefer real commands and gate checks over self-reported claims.
7. For Standard work, keep evidence reports under `.gemini/forgekit/reports/`.
8. Before final response, update:
   - `.gemini/forgekit/CURRENT.md`
   - `.gemini/forgekit/DECISIONS.md` only for real decisions
   - `.gemini/forgekit/session.json`
9. Refresh `.gemini/forgekit/index/` after meaningful memory changes.
10. Run a checkpoint before calling the task done.

Do not auto-load large memory files.
Do not finish Standard work without plan/report files unless writes are blocked and deferred clearly.
Do not claim release readiness when ship gate blocks.
"""
