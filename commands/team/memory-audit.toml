description = "Audit ForgeKit memory for stale, oversized, missing, or inconsistent project state."

prompt = """
Audit ForgeKit project memory.

Use MCP tool `forgekit_audit_memory` when available. If the MCP server is not enabled, inspect memory files directly.

Check:
- required hot memory files exist
- `.gemini/context/current-work.md` is current and concise
- `.gemini/context/commands.md` and `testing.md` reflect the project
- `.gemini/context/decisions.md` contains only real decisions
- session files exist for active non-trivial work
- old session/report details are archived or summarized
- `.gemini/forgekit/memory/manifest.json` exists if memory indexing is in use
- no secrets or `.env` contents are stored in memory

Final response must include:
- pass, pass-with-risk, or block
- missing files
- stale files
- oversized files
- recommended cleanup
"""
