description = "Fix an issue using the ForgeKit workflow."

prompt = """
User request:
{{args}}

Use the ForgeKit bug-fix workflow.

Required flow:
1. Read `.gemini/forgekit/CURRENT.md` first.
2. Read `.gemini/forgekit/PROJECT.md` and `.gemini/forgekit/DECISIONS.md` only if needed.
3. Create or update `.gemini/forgekit/session.json`.
   - Prefer MCP tool `forgekit_update_session` when available.
4. For multi-step fixes, write a plan under `.gemini/forgekit/plans/`.
   - Prefer MCP tool `forgekit_write_plan` when available.
5. Diagnose root cause before implementation.
6. Update session state when the fix moves from diagnosis to implementation to verification.
7. If diagnosis produced reusable debugging knowledge, persist a note under `.gemini/forgekit/notes/`.
8. Verify with real commands and gates, not only narrative claims.
9. Write evidence reports under `.gemini/forgekit/reports/` when useful.
   - Prefer MCP tool `forgekit_write_report` when available.
10. Before final response, update `.gemini/forgekit/CURRENT.md`, session state, and the index.
11. Run a checkpoint before calling the issue fixed.
"""
