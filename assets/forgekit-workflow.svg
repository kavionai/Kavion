<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ForgeKit workflow diagram</title>
  <desc id="desc">ForgeKit workflow showing developer input, the main agent, specialist agents, MCP tools, project memory, quality gates, and GitHub delivery.</desc>

  <rect width="1280" height="860" fill="#F7F9FB"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#202124"/>
    </marker>
  </defs>

  <g transform="translate(70 58)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="850" fill="#202124" letter-spacing="0">How ForgeKit Works</text>
    <text x="0" y="58" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#5F6368" letter-spacing="0">A practical team workflow for planning, building, testing, reviewing, remembering, and shipping.</text>
  </g>

  <g transform="translate(70 150)">
    <rect width="1140" height="628" rx="8" fill="#FFFFFF" stroke="#202124" stroke-width="2"/>
    <path d="M0 78H1140" stroke="#DADCE0"/>
    <text x="32" y="48" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Execution Flow</text>
    <text x="964" y="48" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#5F6368">Gemini CLI Extension</text>
    <rect x="980" y="28" width="118" height="28" rx="8" fill="#202124"/>
    <text x="1039" y="47" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF">ForgeKit</text>

    <g transform="translate(36 126)">
      <rect width="172" height="88" rx="8" fill="#E8F5F1" stroke="#00A887" stroke-width="2"/>
      <text x="86" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">Developer</text>
      <text x="86" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#5F6368">gives the task</text>
    </g>

    <path d="M226 170H304" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(322 104)">
      <rect width="226" height="132" rx="8" fill="#FAFAFA" stroke="#202124" stroke-width="2"/>
      <text x="113" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Main Agent</text>
      <text x="113" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">reads memory</text>
      <text x="113" y="86" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">plans and delegates</text>
      <text x="113" y="110" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">owns final response</text>
    </g>

    <path d="M548 170H626" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(644 104)">
      <rect width="460" height="132" rx="8" fill="#EEF3FE" stroke="#4C7BE8" stroke-width="2"/>
      <text x="230" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Specialist Agents</text>
      <g transform="translate(28 58)">
        <rect width="92" height="30" rx="8" fill="#FFFFFF" stroke="#4C7BE8"/>
        <text x="46" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" fill="#202124">Frontend</text>
      </g>
      <g transform="translate(134 58)">
        <rect width="92" height="30" rx="8" fill="#FFFFFF" stroke="#4C7BE8"/>
        <text x="46" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" fill="#202124">Backend</text>
      </g>
      <g transform="translate(240 58)">
        <rect width="92" height="30" rx="8" fill="#FFFFFF" stroke="#4C7BE8"/>
        <text x="46" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" fill="#202124">Database</text>
      </g>
      <g transform="translate(346 58)">
        <rect width="86" height="30" rx="8" fill="#FFFFFF" stroke="#4C7BE8"/>
        <text x="43" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="800" fill="#202124">QA</text>
      </g>
      <text x="230" y="112" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">security, review, docs, GitHub, automation when needed</text>
    </g>

    <path d="M435 236V318" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M874 236V318" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(210 334)">
      <rect width="450" height="154" rx="8" fill="#FFF6DE" stroke="#D9A000" stroke-width="2"/>
      <text x="225" y="36" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Project Memory System</text>
      <text x="225" y="66" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">hot context, sessions, plans, reports, notes, archive</text>
      <text x="225" y="92" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">local recall: LanceDB when available, JSONL fallback always</text>
      <g transform="translate(116 112)">
        <rect width="218" height="28" rx="8" fill="#202124"/>
        <text x="109" y="19" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#FFFFFF">/team:dashboard</text>
      </g>
    </g>

    <g transform="translate(712 334)">
      <rect width="392" height="154" rx="8" fill="#FDECEE" stroke="#D64550" stroke-width="2"/>
      <text x="196" y="36" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#202124">Quality Gate</text>
      <text x="196" y="66" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">tests, security checks, code review</text>
      <text x="196" y="92" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">memory closeout before final response</text>
      <g transform="translate(87 112)">
        <rect width="218" height="28" rx="8" fill="#202124"/>
        <text x="109" y="19" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#FFFFFF">/team:quality-gate</text>
      </g>
    </g>

    <path d="M435 488V548" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M908 488V548" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(210 564)">
      <rect width="450" height="44" rx="8" fill="#E8F5F1" stroke="#00A887" stroke-width="2"/>
      <text x="225" y="28" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="850" fill="#202124">Updated memory and session state</text>
    </g>
    <g transform="translate(712 564)">
      <rect width="392" height="44" rx="8" fill="#EEF3FE" stroke="#4C7BE8" stroke-width="2"/>
      <text x="196" y="28" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="850" fill="#202124">GitHub-ready implementation</text>
    </g>
  </g>
</svg>
