<svg width="1280" height="920" viewBox="0 0 1280 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ForgeKit memory system flow</title>
  <desc id="desc">Diagram explaining how ForgeKit project memory is initialized, read, updated, indexed locally, searched, audited, compacted, and kept local to the user's project.</desc>

  <rect width="1280" height="920" fill="#F7F9FB"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#202124"/>
    </marker>
  </defs>

  <g transform="translate(72 58)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="850" fill="#202124" letter-spacing="0">ForgeKit Memory System</text>
    <text x="0" y="58" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="600" fill="#5F6368" letter-spacing="0">Project memory stays local. Markdown is the source of truth. The vector index is a rebuildable cache.</text>
  </g>

  <g transform="translate(72 142)">
    <rect width="1136" height="690" rx="8" fill="#FFFFFF" stroke="#202124" stroke-width="2"/>
    <rect width="1136" height="64" rx="8" fill="#202124"/>
    <text x="32" y="41" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#FFFFFF">Local project folder: .gemini/</text>
    <text x="1104" y="41" text-anchor="end" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="750" fill="#FFFFFF">No hosted memory server</text>

    <g transform="translate(36 112)">
      <rect width="216" height="92" rx="8" fill="#E8F5F1" stroke="#00A887" stroke-width="2"/>
      <text x="108" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">/team:init-project</text>
      <text x="108" y="60" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">creates memory folders</text>
    </g>

    <path d="M270 158H338" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(356 96)">
      <rect width="300" height="124" rx="8" fill="#FFF6DE" stroke="#D9A000" stroke-width="2"/>
      <text x="150" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">Markdown Memory</text>
      <text x="150" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">.gemini/context/</text>
      <text x="150" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">notes, archive, sessions</text>
      <text x="150" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#202124">source of truth</text>
    </g>

    <path d="M674 158H742" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(760 96)">
      <rect width="324" height="124" rx="8" fill="#EEF3FE" stroke="#4C7BE8" stroke-width="2"/>
      <text x="162" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">Local Search Index</text>
      <text x="162" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">.gemini/forgekit/memory/</text>
      <text x="162" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">LanceDB if installed</text>
      <text x="162" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#202124">JSONL fallback always</text>
    </g>

    <path d="M506 220V294" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M922 220V294" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(146 312)">
      <rect width="280" height="126" rx="8" fill="#FAFAFA" stroke="#202124" stroke-width="2"/>
      <text x="140" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">Before Work</text>
      <text x="140" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">agent reads project memory</text>
      <text x="140" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">searches only relevant chunks</text>
      <text x="140" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#202124">less token waste</text>
    </g>

    <g transform="translate(500 312)">
      <rect width="280" height="126" rx="8" fill="#FDECEE" stroke="#D64550" stroke-width="2"/>
      <text x="140" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">During Work</text>
      <text x="140" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">active session is updated</text>
      <text x="140" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">plans and reports are saved</text>
      <text x="140" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#202124">task state survives tomorrow</text>
    </g>

    <g transform="translate(854 312)">
      <rect width="280" height="126" rx="8" fill="#E8F5F1" stroke="#00A887" stroke-width="2"/>
      <text x="140" y="34" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#202124">After Work</text>
      <text x="140" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">memory files are updated</text>
      <text x="140" y="84" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">index refresh is required</text>
      <text x="140" y="106" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="850" fill="#202124">final response reports status</text>
    </g>

    <path d="M426 375H482" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M780 375H836" stroke="#202124" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(146 506)">
      <rect width="280" height="104" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="140" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/team:memory-search</text>
      <text x="140" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">finds relevant memory</text>
      <text x="140" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">without loading everything</text>
    </g>

    <g transform="translate(500 506)">
      <rect width="280" height="104" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="140" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/team:memory-audit</text>
      <text x="140" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">checks missing files</text>
      <text x="140" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">and stale index state</text>
    </g>

    <g transform="translate(854 506)">
      <rect width="280" height="104" rx="8" fill="#FFFFFF" stroke="#DADCE0" stroke-width="2"/>
      <text x="140" y="32" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="850" fill="#202124">/team:memory-compact</text>
      <text x="140" y="58" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">archives old sessions</text>
      <text x="140" y="80" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="650" fill="#5F6368">keeps hot memory small</text>
    </g>
  </g>

  <g transform="translate(112 856)">
    <rect width="1056" height="38" rx="8" fill="#202124"/>
    <text x="528" y="25" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="850" fill="#FFFFFF">User does not manage a server. ForgeKit maintains project files and a local rebuildable index when team commands are used.</text>
  </g>
</svg>
