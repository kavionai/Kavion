      <path d="M460 72V652" stroke="#E5E7EB" stroke-width="2"/>
      <path d="M692 72V652" stroke="#E5E7EB" stroke-width="2"/>
      <path d="M922 72V652" stroke="#E5E7EB" stroke-width="2"/>

