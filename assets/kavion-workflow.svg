<svg width="1280" height="960" viewBox="0 0 1280 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kavion workflow</title>
  <desc id="desc">Kavion workflow showing init, strict session bootstrap, planner-first execution, specialist delegation, worker-backed state, and evidence-driven gates.</desc>

  <rect width="1280" height="960" fill="#F3F4F6"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#111827"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g transform="translate(64 52)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="850" fill="#111827">Kavion Workflow</text>
    <text x="0" y="54" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600" fill="#4B5563">Initialize once, bootstrap state before action, plan before code, delegate domain work, and let real evidence decide when a task can close.</text>

    <g transform="translate(0 96)">
      <rect width="1152" height="762" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="2"/>

      <rect width="1152" height="72" rx="8" fill="#111827"/>
      <text x="28" y="45" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#FFFFFF">Execution Flow</text>

      <g transform="translate(862 20)">
        <rect width="92" height="30" rx="8" fill="#14B8A6"/>
        <text x="46" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#083344">state</text>
      </g>
      <g transform="translate(964 20)">
        <rect width="80" height="30" rx="8" fill="#F59E0B"/>
        <text x="40" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#451A03">flow</text>
      </g>
      <g transform="translate(1054 20)">
        <rect width="76" height="30" rx="8" fill="#F87171"/>
        <text x="38" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#450A0A">gates</text>
      </g>

      <path d="M192 72V646" stroke="#E5E7EB" stroke-width="2"/>
      <path d="M420 72V646" stroke="#E5E7EB" stroke-width="2"/>
      <path d="M648 72V646" stroke="#E5E7EB" stroke-width="2"/>
      <path d="M876 72V646" stroke="#E5E7EB" stroke-width="2"/>

      <text x="28" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#6B7280">00 INIT</text>
      <text x="220" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#6B7280">01 START / RESUME</text>
      <text x="448" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#6B7280">02 PLAN</text>
      <text x="676" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#6B7280">03 EXECUTE</text>
      <text x="904" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" fill="#6B7280">04 VERIFY / CLOSE</text>

      <g transform="translate(24 132)" filter="url(#shadow)">
        <rect width="148" height="162" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
        <rect width="148" height="8" rx="8" fill="#F59E0B"/>
        <text x="16" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="850" fill="#111827">/kavion:</text>
        <text x="16" y="54" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="850" fill="#111827">init-project</text>
        <text x="16" y="82" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">Creates .kavion,</text>
        <text x="16" y="102" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">state.db, rendered</text>
        <text x="16" y="122" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">views, and minimal</text>
        <text x="16" y="142" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">Gemini hooks.</text>
      </g>

      <g transform="translate(220 132)" filter="url(#shadow)">
        <rect width="172" height="146" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
        <rect width="172" height="8" rx="8" fill="#F59E0B"/>
        <text x="18" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#111827">/kavion:start</text>
        <text x="18" y="64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Bootstrap only.</text>
        <text x="18" y="86" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Open session, classify,</text>
        <text x="18" y="106" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">set next step, then stop.</text>
        <text x="18" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">No implementation.</text>
      </g>

      <g transform="translate(220 304)" filter="url(#shadow)">
        <rect width="172" height="126" rx="8" fill="#ECFEFF" stroke="#99F6E4" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">/kavion:status</text>
        <text x="18" y="60" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Confirms workspace,</text>
        <text x="18" y="80" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">phase, blockers, and</text>
        <text x="18" y="100" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">required specialists.</text>
      </g>

      <g transform="translate(220 456)" filter="url(#shadow)">
        <rect width="172" height="110" rx="8" fill="#ECFEFF" stroke="#99F6E4" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">/kavion:resume</text>
        <text x="18" y="60" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Reattaches to the</text>
        <text x="18" y="80" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">active session later.</text>
      </g>

      <g transform="translate(448 132)" filter="url(#shadow)">
        <rect width="172" height="146" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
        <rect width="172" height="8" rx="8" fill="#F59E0B"/>
        <text x="18" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#111827">/kavion:feature</text>
        <text x="18" y="64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Execution starts here.</text>
        <text x="18" y="86" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Planner first, then the</text>
        <text x="18" y="106" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">required specialists.</text>
        <text x="18" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Code phase is gated.</text>
      </g>

      <g transform="translate(448 304)" filter="url(#shadow)">
        <rect width="172" height="132" rx="8" fill="#ECFEFF" stroke="#99F6E4" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">Worker State</text>
        <text x="18" y="60" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">state.db</text>
        <text x="18" y="82" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">task, session, phase,</text>
        <text x="18" y="102" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">events, artifacts, gates</text>
      </g>

      <g transform="translate(448 462)" filter="url(#shadow)">
        <rect width="172" height="104" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">BeforeAgent</text>
        <text x="18" y="60" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Blocks `plan -&gt; code`</text>
        <text x="18" y="80" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">until a plan exists.</text>
      </g>

      <g transform="translate(676 132)" filter="url(#shadow)">
        <rect width="172" height="176" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
        <rect width="172" height="8" rx="8" fill="#F59E0B"/>
        <text x="18" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#111827">Coordinator</text>
        <text x="18" y="64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Main agent owns session</text>
        <text x="18" y="84" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">state and synthesis.</text>
        <text x="18" y="114" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Not the primary</text>
        <text x="18" y="134" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">implementer for normal</text>
        <text x="18" y="154" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">backend/domain work.</text>
      </g>

      <g transform="translate(676 334)" filter="url(#shadow)">
        <rect width="172" height="248" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">Required Specialists</text>
        <text x="18" y="64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">task-planner</text>
        <text x="18" y="88" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">backend-engineer</text>
        <text x="18" y="112" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">database-engineer</text>
        <text x="18" y="136" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">security-engineer</text>
        <text x="18" y="160" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">qa-test-engineer</text>
        <text x="18" y="184" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">code-reviewer</text>
        <text x="18" y="216" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">Set by worker policy</text>
        <text x="18" y="234" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">from task class</text>
        <text x="18" y="252" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#4B5563">and scope.</text>
      </g>

      <g transform="translate(904 132)" filter="url(#shadow)">
        <rect width="192" height="150" rx="8" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
        <rect width="192" height="8" rx="8" fill="#F87171"/>
        <text x="18" y="36" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="850" fill="#111827">Gate Evidence</text>
        <text x="18" y="64" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">real command exits, git</text>
        <text x="18" y="84" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">state, fresh reports, and</text>
        <text x="18" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">worker-backed artifacts</text>
        <text x="18" y="128" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">No self-reported done.</text>
      </g>

      <g transform="translate(904 308)" filter="url(#shadow)">
        <rect width="192" height="122" rx="8" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">Rendered Views</text>
        <text x="18" y="60" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">CURRENT.md</text>
        <text x="18" y="82" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">session.json</text>
        <text x="18" y="104" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">history/*.md</text>
      </g>

      <g transform="translate(904 456)" filter="url(#shadow)">
        <rect width="192" height="110" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5"/>
        <text x="18" y="34" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="850" fill="#111827">AfterTool</text>
        <text x="18" y="60" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">Logs events after work,</text>
        <text x="18" y="80" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#4B5563">keeps session state fresh.</text>
      </g>

      <path d="M164 205H212" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M392 205H440" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M620 205H668" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M848 205H896" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>

      <path d="M306 278V304" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M306 430V456" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M534 278V304" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M534 436V462" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M762 308V334" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M1000 282V308" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>
      <path d="M1000 430V456" stroke="#111827" stroke-width="2" marker-end="url(#arrow)"/>

      <g transform="translate(28 698)">
        <rect width="1096" height="84" rx="8" fill="#111827"/>
        <text x="24" y="28" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF">Expected sequence</text>
        <text x="24" y="50" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#D1D5DB">/kavion:init-project -&gt; /kavion:start -&gt; /kavion:status or /kavion:resume -&gt; /kavion:feature</text>
        <text x="24" y="70" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#D1D5DB">-&gt; plan artifact -&gt; specialist execution -&gt; reports and gates -&gt; archive</text>
      </g>
    </g>
  </g>
</svg>
