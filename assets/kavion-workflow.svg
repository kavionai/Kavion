<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kavion delivery workflow</title>
  <desc id="desc">Professional workflow diagram for Kavion showing request intake, main agent coordination, working memory, real verification gates, and GitHub-ready output.</desc>

  <rect width="1280" height="860" fill="#F3F4F6"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#1F2937"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <g transform="translate(64 52)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="40" font-weight="850" fill="#111827">Kavion Workflow</text>
    <text x="0" y="54" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600" fill="#4B5563">Structured delivery path from developer request to honest ship decision.</text>

