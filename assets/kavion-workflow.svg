          <text x="51" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#3F2A00">on-demand</text>
        </g>
        <g transform="translate(1078 20)">
          <rect width="46" height="30" rx="8" fill="#F87171"/>
          <text x="23" y="20" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="800" fill="#3F0A0A">gate</text>
        </g>
      </g>

